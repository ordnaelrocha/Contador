<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Assistência às Reuniões</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* TEMA AREIA CONFORTO E FONTE MÉDIA INTER */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            font-size: 15px; 
            background-color: #f7f2ea; /* Areia Claro */
            color: #433e37; /* Marrom Escuro Conforto */
            -webkit-tap-highlight-color: transparent;
        }
        .bg-areia-card { background-color: #f0e6d6; }
        .border-areia { border-color: #e6dac4; }
        
        .chart-container {
            position: relative;
            height: 220px;
            width: 100%;
        }
        .painel-aba {
            display: none;
        }
        .painel-aba.active {
            display: block;
        }
        
        /* Cores Dinâmicas Baseadas na Seleção */
        :root { --cor-dinamica: #8b5cf6; --cor-dinamica-hover: #7c3aed; --cor-dinamica-bg: #f5f3ff; }
        .txt-dinamico { color: var(--cor-dinamica); }
        .bg-dinamico { background-color: var(--cor-dinamica); }
        .bg-dinamico-hover:hover { background-color: var(--cor-dinamica-hover); }
        .bg-dinamico-suave { background-color: var(--cor-dinamica-bg); }
        .border-dinamico { border-color: var(--cor-dinamica); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-6">

    <header class="bg-gray-900 text-amber-100 shadow-md sticky top-0 z-50 px-4 py-3.5 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-building text-2xl text-amber-200/70"></i>
            <div>
                <h1 class="text-base font-bold leading-tight">Contador de Assistência</h1>
                <p class="text-[11px] text-amber-200/50">Tema Areia Conforto</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <!-- SELETOR DE CORES -->
            <select id="seletor-cor-app" onchange="mudarCorDestaque(this.value)" class="bg-gray-800 text-amber-100 text-xs rounded-lg p-1.5 font-semibold outline-none border border-gray-700 cursor-pointer">
                <option value="roxo">💜 Roxo</option>
                <option value="azul">💙 Azul</option>
                <option value="verde">💚 Verde</option>
                <option value="laranja">🧡 Laranja</option>
                <option value="marrom">🤎 Marrom</option>
            </select>
            <button onclick="confirmarAcao('Zerar contagem atual?', reiniciarContagem)" class="bg-gray-800 hover:bg-gray-700 active:scale-95 transition-all text-xs font-semibold px-2.5 py-1.5 rounded-lg flex items-center space-x-1.5 border border-gray-700">
                <i class="fa-solid fa-rotate-left"></i>
                <span>Zerar</span>
            </button>
        </div>
    </header>
    <!-- ABAS DE NAVEGAÇÃO PRINCIPAL -->
    <div class="bg-[#f0e6d6] border-b border-[#e6dac4] sticky top-[61px] z-40 max-w-md w-full mx-auto grid grid-cols-2 text-center font-bold text-sm">
        <button id="btn-tab-contador" onclick="mudarAbaPrincipal('contador')" class="py-3.5 text-gray-800 border-b-2 border-gray-800 transition-all flex items-center justify-center space-x-2">
            <i class="fa-solid fa-calculator"></i><span>Contador</span>
        </button>
        <button id="btn-tab-historico" onclick="mudarAbaPrincipal('historico')" class="py-3.5 text-gray-400 border-b-2 border-transparent transition-all flex items-center justify-center space-x-2">
            <i class="fa-solid fa-history"></i><span>Histórico</span>
        </button>
    </div>

    <main class="max-w-md w-full mx-auto px-4 pt-4 flex-grow space-y-5">
        
        <!-- ================= ABA 1: CONTADOR ================= -->
        <div id="conteudo-tab-contador" class="painel-aba active space-y-5">
            
            <!-- Painel de Exibição Total -->
            <div class="bg-[#f0e6d6] rounded-2xl shadow-sm border border-[#e6dac4] p-5 flex justify-between items-center relative overflow-hidden">
                <div id="barra-cor-lateral" class="absolute top-0 left-0 w-2 h-full bg-dinamico"></div>
                <div>
                    <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Total Geral</span>
                    <div id="total-geral" class="text-4xl font-black text-gray-900 mt-0.5">0</div>
                </div>
                <div class="flex space-x-4 text-right">
                    <div>
                        <span class="text-xs font-semibold text-gray-500 block">No Salão</span>
                        <span id="total-salao" class="text-lg font-bold text-gray-800">0</span>
                    </div>
                    <div class="border-l border-[#e6dac4] pl-4">
                        <span class="text-xs font-semibold text-gray-500 block">Zoom</span>
                        <span id="total-zoom" class="text-lg font-bold text-sky-700">0</span>
                    </div>
                </div>
            </div>

            <!-- Seção do Zoom -->
            <div class="bg-sky-50 rounded-2xl p-4 border border-sky-200/60">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center space-x-2 text-sky-900">
                        <i class="fa-solid fa-video text-base"></i>
                        <h2 class="font-bold text-xs uppercase tracking-wider">Assistência via Zoom</h2>
                    </div>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="alterarZoom(1)" class="bg-white hover:bg-sky-100 active:scale-95 border border-sky-200 text-sky-800 font-bold py-2 rounded-xl text-sm transition-all shadow-sm">+1</button>
                    <button onclick="alterarZoom(5)" class="bg-white hover:bg-sky-100 active:scale-95 border border-sky-200 text-sky-800 font-bold py-2 rounded-xl text-sm transition-all shadow-sm">+5</button>
                    <button onclick="alterarZoom(10)" class="bg-white hover:bg-sky-100 active:scale-95 border border-sky-200 text-sky-800 font-bold py-2 rounded-xl text-sm transition-all shadow-sm">+10</button>
                    <button onclick="alterarZoom(-1)" class="bg-white hover:bg-red-50 active:scale-95 border border-red-200 text-red-600 font-bold py-2 rounded-xl text-sm transition-all shadow-sm">
                        <i class="fa-solid fa-minus"></i>
                    </button>
                </div>
            </div>
            <!-- Seção das Fileiras (Lado a Lado) -->
            <div>
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-gray-500 font-bold text-xs uppercase tracking-wider flex items-center space-x-1.5">
                        <i class="fa-solid fa-users"></i>
                        <span>Salão do Reino (Fileiras)</span>
                    </h2>
                    <button onclick="abrirPromptBonito('Nome do lugar/setor:', '', 'Adicionar', 'Fileira', cadastrarNovaFileira)" class="text-gray-800 hover:bg-[#dfd4bf] font-bold text-xs flex items-center space-x-1 bg-[#eadeca] px-3 py-2 rounded-full transition-all border border-[#dfd4bf]">
                        <i class="fa-solid fa-plus"></i>
                        <span>Nova Fileira</span>
                    </button>
                </div>
                <div id="lista-fileiras" class="grid grid-cols-2 gap-2"></div>
            </div>

            <!-- Painel de Salvamento -->
            <div class="bg-[#f0e6d6] rounded-2xl p-5 border border-[#e6dac4] shadow-sm space-y-4">
                <h2 class="text-gray-500 font-bold text-xs uppercase tracking-wider flex items-center space-x-1.5">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>Finalizar e Salvar</span>
                </h2>
                <div class="flex gap-2">
                    <label class="flex-1">
                        <input type="radio" name="tipo-reuniao" value="Meio de Semana" checked onclick="alternarDiasReuniao('Meio de Semana')" class="hidden peer">
                        <div class="text-center p-2.5 rounded-xl border border-[#e6dac4] bg-white peer-checked:bg-gray-900 peer-checked:text-amber-100 peer-checked:border-gray-900 cursor-pointer text-xs font-bold transition-all">
                            Meio de Semana
                        </div>
                    </label>
                    <label class="flex-1">
                        <input type="radio" name="tipo-reuniao" value="Fim de Semana" onclick="alternarDiasReuniao('Fim de Semana')" class="hidden peer">
                        <div class="text-center p-2.5 rounded-xl border border-[#e6dac4] bg-white peer-checked:bg-gray-900 peer-checked:text-amber-100 peer-checked:border-gray-900 cursor-pointer text-xs font-bold transition-all">
                            Fim de Semana
                        </div>
                    </label>
                </div>
                
                <div class="space-y-1.5">
                    <label for="seletor-dia" class="text-gray-500 font-bold text-[10px] uppercase tracking-wider block pl-1">Escolha o Dia da Reunião</label>
                    <select id="seletor-dia" class="w-full bg-white border border-[#e6dac4] text-gray-800 text-sm rounded-xl p-2.5 font-medium outline-none cursor-pointer">
                    </select>
                </div>

                <button onclick="salvarNoHistorico()" class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.99] transition-all flex items-center justify-center space-x-2 text-sm">
                    <i class="fa-solid fa-check-double"></i>
                    <span>Registrar Reunião</span>
                </button>
            </div>
        </div>

        <!-- ================= ABA 2: HISTÓRICO E GRÁFICOS ================= -->
        <div id="conteudo-tab-historico" class="painel-aba space-y-5">
            <div class="bg-[#f0e6d6] rounded-2xl border border-[#e6dac4] shadow-sm overflow-hidden">
                <div class="bg-[#e6dac4] p-1.5 grid grid-cols-2 gap-1 rounded-t-2xl">
                    <button id="btn-subtab-medias" onclick="mudarSubTab('medias')" class="py-2 bg-white text-gray-800 shadow-sm rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1">
                        <i class="fa-solid fa-chart-bar text-amber-700"></i><span>Médias Gerais</span>
                    </button>
                    <button id="btn-subtab-mensal" onclick="mudarSubTab('mensal')" class="py-2 text-gray-500 rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1">
                        <i class="fa-solid fa-calendar-check text-emerald-700"></i><span>Evolução Mensal</span>
                    </button>
                </div>
                <div class="p-4">
                    <div id="subtab-conteudo-medias" class="painel-aba active">
                        <div class="chart-container"><canvas id="mediaChart"></canvas></div>
                    </div>
                    <div id="subtab-conteudo-mensal" class="painel-aba space-y-4">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-gray-500 font-bold text-[10px] uppercase tracking-wider">Histórico Comparativo</span>
                            <button onclick="abrirModalParciais()" class="text-xs font-bold text-gray-800 bg-[#eadeca] border border-[#dfd4bf] px-3 py-1.5 rounded-full transition-all flex items-center space-x-1">
                                <i class="fa-solid fa-chart-pie"></i><span>Ver Parciais do Mês</span>
                            </button>
                        </div>
                        <div class="chart-container"><canvas id="mensalChart"></canvas></div>
                        <div id="lista-relatorios-mensais" class="space-y-4 pt-2"></div>
                    </div>
                </div>
            </div>
            <div class="space-y-3">
                <h2 class="text-gray-500 font-bold text-xs uppercase tracking-wider px-1 flex items-center space-x-1.5">
                    <i class="fa-solid fa-history"></i><span>Últimos Registros Gravados</span>
                </h2>
                <div id="lista-historico" class="space-y-2.5"></div>
            </div>
        </div>
    </main>
    <!-- NOVO MODAL: BALÃO QUADRADO BONITO DE PROMPT (DIGITAR) -->
    <div id="custom-prompt-modal" class="fixed inset-0 bg-black/50 z-[110] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#f7f2ea] border border-[#e6dac4] w-full max-w-xs rounded-2xl shadow-xl overflow-hidden p-5 space-y-4 animate-in fade-in zoom-in duration-200">
            <h3 id="prompt-titulo" class="font-bold text-sm text-gray-800">Editar</h3>
            <input type="text" id="prompt-input" class="w-full bg-white border border-[#e6dac4] rounded-xl p-3 text-sm font-medium text-gray-800 outline-none focus:border-gray-400 transition-all">
            <div class="grid grid-cols-2 gap-2 pt-1">
                <button onclick="fecharPromptBonito()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 rounded-xl text-xs transition-all">Cancelar</button>
                <button id="prompt-btn-confirmar" class="bg-gray-900 hover:bg-gray-800 text-amber-100 font-bold py-2.5 rounded-xl text-xs transition-all">Salvar</button>
            </div>
        </div>
    </div>

    <!-- NOVO MODAL: BALÃO QUADRADO BONITO DE CONFIRMAÇÃO (SIM/NÃO) -->
    <div id="custom-confirm-modal" class="fixed inset-0 bg-black/50 z-[110] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#f7f2ea] border border-[#e6dac4] w-full max-w-xs rounded-2xl shadow-xl overflow-hidden p-5 space-y-4 text-center">
            <div class="mx-auto w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center text-amber-800"><i class="fa-solid fa-circle-question text-lg"></i></div>
            <p id="confirm-mensagem" class="font-medium text-sm text-gray-800 px-1"></p>
            <div class="grid grid-cols-2 gap-2 pt-1">
                <button onclick="fecharConfirmAcao()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 rounded-xl text-xs transition-all">Não</button>
                <button id="confirm-btn-sim" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-xl text-xs transition-all">Sim</button>
            </div>
        </div>
    </div>

    <!-- NOVO MODAL: ALERTA SIMPLES -->
    <div id="custom-alert-modal" class="fixed inset-0 bg-black/50 z-[110] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#f7f2ea] border border-[#e6dac4] w-full max-w-xs rounded-2xl shadow-xl overflow-hidden p-5 space-y-4 text-center">
            <div class="mx-auto w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-800"><i class="fa-solid fa-circle-check text-lg"></i></div>
            <p id="alert-mensagem" class="font-medium text-sm text-gray-800 px-1"></p>
            <button onclick="fecharAlertaBonito()" class="w-full bg-gray-900 hover:bg-gray-800 text-amber-100 font-bold py-2.5 rounded-xl text-xs transition-all">Ok</button>
        </div>
    </div>

    <!-- Modal das Parciais -->
    <div id="modal-parciais" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#f7f2ea] w-full max-w-sm rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh] border border-[#e6dac4]">
            <div class="bg-gray-900 text-amber-100 p-4 flex justify-between items-center">
                <div><h3 id="modal-titulo-mes" class="font-black text-xs uppercase tracking-wider">Parciais do Mês</h3><p class="text-[11px] text-amber-200/60">Distribuição e dados parciais</p></div>
                <button onclick="fecharModalParciais()" class="text-white/80 hover:text-white text-xl p-1"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 space-y-4 overflow-y-auto flex-grow">
                <div class="relative h-44 w-full flex items-center justify-center"><canvas id="pizzaParcialChart"></canvas></div>
                <div id="modal-detalhes-conteudo" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let appState = {
            fileiras: [
                { id: 1, nome: "Fileira 1", quantidade: 0 },
                { id: 2, nome: "Fileira 2", quantidade: 0 },
                { id: 3, nome: "Fileira 3", quantidade: 0 }
            ],
            zoom: 0,
            historico: [],
            corDestaque: "roxo"
        };

        const paletaCores = {
            roxo: { primary: "#8b5cf6", hover: "#7c3aed", bg: "#f5f3ff" },
            azul: { primary: "#3b82f6", hover: "#2563eb", bg: "#eff6ff" },
            verde: { primary: "#10b981", hover: "#059669", bg: "#ecfdf5" },
            laranja: { primary: "#f97316", hover: "#ea580c", bg: "#fff7ed" },
            marrom: { primary: "#a16207", hover: "#854d0e", bg: "#fefce8" }
        };

        let myChart = null; let myMChart = null; let myPChart = null;

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('contador_reuniao_data');
            if (saved) appState = JSON.parse(saved);
            if (!appState.corDestaque) appState.corDestaque = "roxo";
            
            document.getElementById('seletor-cor-app').value = appState.corDestaque;
            mudarCorDestaque(appState.corDestaque);
            alternarDiasReuniao('Meio de Semana');
            renderizarApp();
            atualizarGraficos();
        });
        /* FUNÇÕES LOGICAS DOS POPUPS EXCLUSIVOS */
        let callbackPromptAtual = null;
        function abrirPromptBonito(titulo, valorPadrao, textoBotao, idOpcional, callback) {
            document.getElementById('prompt-titulo').innerText = titulo;
            const input = document.getElementById('prompt-input');
            input.value = valorPadrao;
            document.getElementById('prompt-btn-confirmar').innerText = textoBotao;
            document.getElementById('custom-prompt-modal').style.display = 'flex';
            callbackPromptAtual = callback;
            setTimeout(() => input.focus(), 100);
            
            document.getElementById('prompt-btn-confirmar').onclick = function() {
                const texto = input.value.trim();
                if(texto !== "") {
                    callbackPromptAtual(texto, idOpcional);
                    fecharPromptBonito();
                }
            };
        }
        function fecharPromptBonito() { document.getElementById('custom-prompt-modal').style.display = 'none'; }

        function confirmarAcao(mensagem, callbackSim) {
            document.getElementById('confirm-mensagem').innerText = mensagem;
            document.getElementById('custom-confirm-modal').style.display = 'flex';
            document.getElementById('confirm-btn-sim').onclick = function() {
                callbackSim();
                fecharConfirmAcao();
            };
        }
        function fecharConfirmAcao() { document.getElementById('custom-confirm-modal').style.display = 'none'; }

        function exibirAlertaBonito(mensagem) {
            document.getElementById('alert-mensagem').innerText = mensagem;
            document.getElementById('custom-alert-modal').style.display = 'flex';
        }
        function fecharAlertaBonito() { document.getElementById('custom-alert-modal').style.display = 'none'; }

        /* FUNÇÕES DE GERENCIAMENTO DE FILEIRAS */
        function atualizarNomeFileira(novoNome, id) {
            const fileira = appState.fileiras.find(f => f.id === id);
            if (fileira) { fileira.nome = novoNome; renderizarApp(); salvarNoLocalStorage(); }
        }
        function cadastrarNovaFileira(nomeDigitado) {
            const proximoId = appState.fileiras.length > 0 ? Math.max(...appState.fileiras.map(f => f.id)) + 1 : 1;
            appState.fileiras.push({ id: proximoId, nome: nomeDigitado, quantidade: 0 });
            renderizarApp(); salvarNoLocalStorage();
        }

        function mudarCorDestaque(cor) {
            appState.corDestaque = cor;
            const c = paletaCores[cor] || paletaCores.roxo;
            document.documentElement.style.setProperty('--cor-dinamica', c.primary);
            document.documentElement.style.setProperty('--cor-dinamica-hover', c.hover);
            document.documentElement.style.setProperty('--cor-dinamica-bg', c.bg);
            salvarNoLocalStorage();
        }
        function salvarNoLocalStorage() { localStorage.setItem('contador_reuniao_data', JSON.stringify(appState)); }
        function alterarQuantidadeFileira(id, valor) {
            const fileira = appState.fileiras.find(f => f.id === id);
            if (fileira) { fileira.quantidade = Math.max(0, fileira.quantidade + valor); renderizarApp(); salvarNoLocalStorage(); }
        }
        function alterarZoom(valor) { appState.zoom = Math.max(0, appState.zoom + valor); renderizarApp(); salvarNoLocalStorage(); }
        function reiniciarContagem() { appState.fileiras.forEach(f => f.quantidade = 0); appState.zoom = 0; renderizarApp(); salvarNoLocalStorage(); }

        function salvarNoHistorico() {
            const totalSalao = appState.fileiras.reduce((acc, f) => acc + f.quantidade, 0);
            const totalGeral = totalSalao + appState.zoom;
            if (totalGeral === 0) return exibirAlertaBonito("A contagem está vazia!");
            const tipo = document.querySelector('input[name="tipo-reuniao"]:checked').value;
            const diaEscolhido = document.getElementById('seletor-dia').value;
            const dataAtual = new Date();
            
            appState.historico.unshift({
                id: Date.now(), data: dataAtual.toLocaleDateString('pt-BR') + ' ' + dataAtual.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
                diaSemana: diaEscolhido, total: totalGeral, salao: totalSalao, zoom: appState.zoom, tipo: tipo,
                mesAno: `${dataAtual.getMonth() + 1}/${dataAtual.getFullYear()}`, timestamp: Date.now()
            });
            reiniciarContagem(); atualizarGraficos(); exibirAlertaBonito("Reunião registrada com sucesso!");
        }

        function deletarHistorico(id) { appState.historico = appState.historico.filter(h => h.id !== id); renderizarApp(); atualizarGraficos(); salvarNoLocalStorage(); }
        function mudarAbaPrincipal(aba) {
            document.getElementById('conteudo-tab-contador').classList.remove('active'); document.getElementById('conteudo-tab-historico').classList.remove('active');
            document.getElementById('btn-tab-contador').className = "py-3.5 text-gray-400 border-b-2 border-transparent transition-all flex items-center justify-center space-x-2";
            document.getElementById('btn-tab-historico').className = "py-3.5 text-gray-400 border-b-2 border-transparent transition-all flex items-center justify-center space-x-2";
            if (aba === 'contador') {
                document.getElementById('conteudo-tab-contador').classList.add('active');
                document.getElementById('btn-tab-contador').className = "py-3.5 text-gray-800 border-b-2 border-gray-800 transition-all flex items-center justify-center space-x-2";
            } else {
                document.getElementById('conteudo-tab-historico').classList.add('active');
                document.getElementById('btn-tab-historico').className = "py-3.5 text-gray-800 border-b-2 border-gray-800 transition-all flex items-center justify-center space-x-2";
                setTimeout(atualizarGraficos, 60);
            }
        }
        function mudarSubTab(subAba) {
            document.getElementById('subtab-conteudo-medias').classList.remove('active'); document.getElementById('subtab-conteudo-mensal').classList.remove('active');
            document.getElementById('btn-subtab-medias').className = "py-2 text-gray-500 rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1";
            document.getElementById('btn-subtab-mensal').className = "py-2 text-gray-500 rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1";
            if (subAba === 'medias') {
                document.getElementById('subtab-conteudo-medias').classList.add('active');
                document.getElementById('btn-subtab-medias').className = "py-2 bg-white text-gray-800 shadow-sm rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1";
            } else {
                document.getElementById('subtab-conteudo-mensal').classList.add('active');
                document.getElementById('btn-subtab-mensal').className = "py-2 bg-white text-gray-800 shadow-sm rounded-xl text-xs font-bold transition-all flex items-center justify-center space-x-1";
            }
            setTimeout(atualizarGraficos, 60);
        }
        function alternarDiasReuniao(tipo) {
            const seletor = document.getElementById('seletor-dia'); if(!seletor) return; seletor.innerHTML = '';
            const dias = tipo === 'Meio de Semana' ? ['Terça-feira', 'Quarta-feira', 'Quinta-feira'] : ['Sábado', 'Domingo'];
            dias.forEach(dia => { const opt = document.createElement('option'); opt.value = dia; opt.innerText = dia; seletor.appendChild(opt); });
        }
        function atualizarGraficos() {
            const cGeral = document.getElementById('mediaChart'); const cMensal = document.getElementById('mensalChart'); if(!cGeral || !cMensal) return;
            const hMeio = appState.historico.filter(h => h.tipo === "Meio de Semana"); const hFim = appState.historico.filter(h => h.tipo === "Fim de Semana");
            const mMeio = hMeio.length ? (hMeio.reduce((acc, h) => acc + h.total, 0) / hMeio.length).toFixed(1) : 0;
            const mFim = hFim.length ? (hFim.reduce((acc, h) => acc + h.total, 0) / hFim.length).toFixed(1) : 0;
            if (myChart) myChart.destroy();
            myChart = new Chart(cGeral.getContext('2d'), { type: 'bar', data: { labels: ['Meio', 'Fim'], datasets: [{ data: [mMeio, mFim], backgroundColor: ['#9a3412', '#065f46'], borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
            if (myMChart) myMChart.destroy(); const dMensais = processarMediasMensais().reverse();
            myMChart = new Chart(cMensal.getContext('2d'), { type: 'line', data: { labels: dMensais.map(d => d.nomeMes.split(' de ')[0]), datasets: [{ label: 'Total', data: dMensais.map(d => parseFloat(d.mediaGeral)), borderColor: '#433e37', tension: 0.1, borderWidth: 2 }, { label: 'Salão', data: dMensais.map(d => parseFloat(d.mediaSalaoGeral)), borderColor: '#065f46', tension: 0.1, borderDash: [4,4] }] }, options: { responsive: true, maintainAspectRatio: false } });
        }
        function processarMediasMensais() {
            const meses = {}; const nomes = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            appState.historico.forEach(reg => {
                if(!reg.mesAno) return; if(!meses[reg.mesAno]) meses[reg.mesAno] = { mSalao: [], mZoom: [], fSalao: [], fZoom: [], totais: [] }; meses[reg.mesAno].totais.push(reg.total);
                if(reg.tipo === "Meio de Semana") { meses[reg.mesAno].mSalao.push(reg.salao); meses[reg.mesAno].mZoom.push(reg.zoom); } else { meses[reg.mesAno].fSalao.push(reg.salao); meses[reg.mesAno].mZoom.push(reg.zoom); }
            });
            return Object.entries(meses).map(([ch, d]) => { const [m, a] = ch.split('/'); const tot = d.totais.length; return { chave: ch, nomeMes: `${nomes[parseInt(m)-1]} de ${a}`, mediaGeral: tot ? (d.totais.reduce((a,b)=>a+b,0)/tot).toFixed(1) : "0", mediaSalaoGeral: ((d.mSalao.concat(d.fSalao).reduce((a,b)=>a+b,0))/(tot||1)).toFixed(1), mediaZoomGeral: ((d.mZoom.reduce((a,b)=>a+b,0))/(tot||1)).toFixed(1), pico: tot ? Math.max(...d.totais) : 0, totalReunioes: tot }; });
        }
        function abrirModalParciais() {
            const r = processarMediasMensais().find(r => r.chave === `${new Date().getMonth() + 1}/${new Date().getFullYear()}`); if(!r) return exibirAlertaBonito("Sem reuniões gravadas este mês.");
            document.getElementById('modal-titulo-mes').innerText = r.nomeMes; document.getElementById('modal-parciais').style.display = 'flex';
            if(myPChart) myPChart.destroy(); myPChart = new Chart(document.getElementById('pizzaParcialChart').getContext('2d'), { type: 'doughnut', data: { labels: ['Salão', 'Zoom'], datasets: [{ data: [parseFloat(r.mediaSalaoGeral), parseFloat(r.mediaZoomGeral)], backgroundColor: ['#065f46', '#0284c7'] }] }, options: { responsive: true, maintainAspectRatio: false } });
            document.getElementById('modal-detalhes-conteudo').innerHTML = `<div class="p-3 bg-white rounded-xl border border-gray-200 text-xs space-y-1"><div>Média Geral: <b>${r.mediaGeral}</b></div><div>Pico Máximo: <b>${r.pico}</b></div></div>`;
        }
        function fecharModalParciais() { document.getElementById('modal-parciais').style.display = 'none'; }
        function renderizarRelatoriosMensais() {
            const container = document.getElementById('lista-relatorios-mensais'); if(!container) return; container.innerHTML = '';
            const mFechados = processarMediasMensais().filter(r => r.chave !== `${new Date().getMonth() + 1}/${new Date().getFullYear()}`);
            if(!mFechados.length) { container.innerHTML = `<p class="text-center text-xs text-gray-400 py-1">Relatórios consolidados surgirão aqui no próximo mês.</p>`; return; }
            mFechados.forEach(r => { const card = document.createElement('div'); card.className = "bg-white border border-[#e6dac4] rounded-2xl p-4 shadow-sm space-y-2 text-xs"; card.innerHTML = `<div class="font-bold text-gray-800 flex justify-between border-b pb-1"><span>${r.nomeMes}</span><span class="text-gray-400">Reuniões: ${r.totalReunioes}</span></div><div>Média Total: <b>${r.mediaGeral}</b> (Salão: ${r.mediaSalaoGeral} | Zoom: ${r.mediaZoomGeral})</div><div class="text-amber-700 font-semibold">Assistência Máxima (Pico): ${r.pico}</div>`; container.appendChild(card); });
        }

        function renderizarApp() {
            const totalSalao = appState.fileiras.reduce((acc, f) => acc + f.quantidade, 0);
            document.getElementById('total-geral').innerText = totalSalao + appState.zoom;
            document.getElementById('total-salao').innerText = totalSalao;
            document.getElementById('total-zoom').innerText = appState.zoom;

            const cFileiras = document.getElementById('lista-fileiras'); cFileiras.innerHTML = '';
            appState.fileiras.forEach(f => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-[#e6dac4] p-2.5 flex flex-col justify-between space-y-2";
                card.innerHTML = `
                    <div class="flex items-center justify-between w-full">
                        <div class="flex space-x-2 text-gray-300">
                            <button onclick="confirmarAcao('Excluir esta fileira?', () => { appState.fileiras = appState.fileiras.filter(fl => fl.id !== ${f.id}); renderizarApp(); salvarNoLocalStorage(); })" class="hover:text-red-500"><i class="fa-regular fa-trash-can text-[11px]"></i></button>
                            <button onclick="abrirPromptBonito('Identificação do lugar:', '${f.nome}', 'Salvar', ${f.id}, atualizarNomeFileira)" class="hover:text-gray-600"><i class="fa-regular fa-pen-to-square text-[11px]"></i></button>
                        </div>
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tight truncate max-w-[70px] text-right">${f.nome}</span>
                    </div>
                    <div class="text-center py-0.5"><span class="text-2xl font-black txt-dinamico block">${f.quantidade}</span></div>
                    <div class="grid grid-cols-2 gap-1 w-full">
                        <button onclick="alterarQuantidadeFileira(${f.id}, -1)" class="bg-gray-50 text-gray-500 rounded-lg py-2 active:bg-gray-200 text-xs font-bold"><i class="fa-solid fa-minus"></i></button>
                        <button onclick="alterarQuantidadeFileira(${f.id}, 1)" class="bg-dinamico-suave txt-dinamico font-bold rounded-lg py-2 active:scale-95 transition-all text-xs">+1</button>
                    </div>`;
                cFileiras.appendChild(card);
            });

            const cHist = document.getElementById('lista-historico'); cHist.innerHTML = '';
            appState.historico.slice(0, 10).forEach(item => {
                const div = document.createElement('div'); div.className = "bg-white border border-[#e6dac4] rounded-xl p-3 flex justify-between items-center text-xs shadow-sm";
                div.innerHTML = `<div><div class="font-bold text-gray-700">${item.tipo} <span class="text-gray-400 font-normal">(${item.diaSemana})</span></div><div class="text-gray-900 font-bold">${item.total} Total <span class="text-gray-400 font-normal text-[11px]">(${item.salao} Salão / ${item.zoom} Zoom)</span></div><div class="text-gray-400 text-[10px] mt-0.5">${item.data}</div></div><button onclick="confirmarAcao('Excluir este registro permanentemente?', () => deletarHistorico(${item.id}))" class="text-gray-300 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>`;
                cHist.appendChild(div);
            });
            renderizarRelatoriosMensais();
        }
    </script>
</body>
</html>
